name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: python -m mypy glassdoor_scraper api

      - name: Test (pytest)
        run: python -m pytest

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.10.1

      - name: Audit dependencies
        # Fails the build on a known vulnerability in a pinned dependency.
        run: pip-audit -r requirements.txt
